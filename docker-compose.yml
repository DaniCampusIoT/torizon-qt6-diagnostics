services:
  diagnostics-debug:
    build:
      context: .
      dockerfile: Dockerfile.debug
      platforms:
        - linux/${IMAGE_ARCH}
      secrets:
        - qt-login
        - qt-password
    image: ${LOCAL_REGISTRY}:5002/diagnostics-debug:${TAG}
    ports:
      - ${DEBUG_SSH_PORT}:${DEBUG_SSH_PORT}
      - ${DEBUG_PORT1}:${DEBUG_PORT1}
      - ${DEBUG_PORT2}:${DEBUG_PORT2}
    volumes:
      - type: bind
        source: /tmp
        target: /tmp
      - type: bind
        source: /dev
        target: /dev
    devices:
      - /dev/spidev0.0:/dev/apalis-spi1-cs0
      - /dev/i2c-4:/dev/i2c-4
    device_cgroup_rules:
      - "c 4:* rmw"
      - "c 13:* rmw"
      - "c 226:* rmw"
      - "c 10:223 rmw"
      - "c 253:* rmw"
      - "c 199:* rmw"
      - "c 153:* rmw"
      - "c 89:* rmw"
    profiles:
      - debug
    depends_on:
      weston:
        condition: service_healthy

  diagnostics:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/${IMAGE_ARCH}
      secrets:
        - qt-login
        - qt-password
    image: ${DOCKER_LOGIN}/diagnostics:${TAG}
    volumes:
      - type: bind
        source: /tmp
        target: /tmp
      - type: bind
        source: /dev
        target: /dev
    devices:
      - /dev/spidev0.0:/dev/apalis-spi1-cs0
      - /dev/i2c-4:/dev/i2c-4
    device_cgroup_rules:
      - "c 4:* rmw"
      - "c 13:* rmw"
      - "c 226:* rmw"
      - "c 10:223 rmw"
      - "c 253:* rmw"
      - "c 199:* rmw"
      - "c 153:* rmw"
      - "c 89:* rmw"
    profiles:
      - release
    depends_on:
      weston:
        condition: service_healthy

  weston:
    image: torizon/weston${GPU}:4
    environment:
      - ACCEPT_FSL_EULA=1
    network_mode: host
    volumes:
      - type: bind
        source: /tmp
        target: /tmp
      - type: bind
        source: /dev
        target: /dev
      - type: bind
        source: /run/udev
        target: /run/udev
    cap_add:
      - CAP_SYS_TTY_CONFIG
    device_cgroup_rules:
      - "c 4:* rmw"
      - "c 13:* rmw"
      - "c 226:* rmw"
      - "c 10:223 rmw"
      - "c 253:* rmw"
      - "c 199:* rmw"
    profiles:
      - release
      - debug
    healthcheck:
      test: ["CMD", "test", "-S", "/tmp/1000-runtime-dir/wayland-0"]
      interval: 5s
      timeout: 4s
      retries: 6
      start_period: 10s

secrets:
  qt-login:
    environment: QT_LICENSE_LOGIN
  qt-password:
    environment: QT_LICENSE_PASSWORD